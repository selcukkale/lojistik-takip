<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lojistik Takip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0f4f8;font-family:Arial,sans-serif;color:#1a202c}
.hidden{display:none!important}
/* HEADER */
.header{background:#1a365d;padding:16px;position:sticky;top:0;z-index:20}
.header-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.header h1{color:#fff;font-size:18px;font-weight:600}
.header-sub{color:#90cdf4;font-size:12px;margin-top:2px}
.switch-btn{background:#2b6cb0;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
/* TABS */
.tabs{background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:56px;z-index:10}
.tabs-inner{max-width:700px;margin:0 auto;display:flex}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#718096}
.tab.active{color:#1a365d;border-bottom-color:#1a365d;font-weight:600}
/* WRAP */
.wrap{max-width:700px;margin:0 auto;padding:16px}
/* CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.summary-card{background:#fff;border-radius:12px;padding:14px;text-align:center;border:1px solid #e2e8f0}
.summary-card .num{font-size:28px;font-weight:700;color:#1a365d}
.summary-card .lbl{font-size:12px;color:#718096;margin-top:4px}
/* BUTTONS */
.btn{border:none;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer;font-family:Arial,sans-serif}
.btn-primary{background:#1a365d;color:#fff}
.btn-success{background:#276749;color:#fff}
.btn-warning{background:#c05621;color:#fff}
.btn-danger{background:#c53030;color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
/* FORM */
.form-box{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid #e2e8f0;display:none}
.form-box.open{display:block}
.form-label{font-size:11px;color:#718096;letter-spacing:1px;margin-bottom:4px;display:block;margin-top:10px}
.form-input{width:100%;padding:9px 11px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:#f7fafc;color:#1a202c;outline:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;margin-top:12px}
/* LIST */
.list{display:flex;flex-direction:column;gap:10px}
.item{background:#fff;border-radius:12px;padding:14px 16px;border:1px solid #e2e8f0;cursor:pointer}
.item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.item-title{font-size:15px;font-weight:600;color:#1a202c}
.item-sub{font-size:12px;color:#718096}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}​​​​​​​​​​​​​​​​
